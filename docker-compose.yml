version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: clinical_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d clinical_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web-backend:
    build: ./web_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:securepassword@db:5432/clinical_db
      - ML_SERVICE_URL=http://ml-service:8001/analyze
    volumes:
      - ./config:/config
    depends_on:
      db:
        condition: service_healthy
      ml-service:
        condition: service_started

  ml-service:
    build: ./ml_service
    ports:
      - "8001:8001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://web-backend:8000
    command: npm run dev
    depends_on:
      - web-backend

volumes:
  postgres_data:
